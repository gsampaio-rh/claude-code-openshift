apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-standalone
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: agent-standalone
    app.kubernetes.io/part-of: agentops-platform
    app.openshift.io/runtime: claude-code
  annotations:
    app.openshift.io/custom-icon: "data:image/svg+xml;base64,"
    openshift.io/display-name: "Claude Code Agent"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-code
      app.kubernetes.io/component: agent-standalone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-code
        app.kubernetes.io/component: agent-standalone
        app.kubernetes.io/part-of: agentops-platform
        kagenti.io/type: agent
    spec:
      serviceAccountName: claude-code-agent
      runtimeClassName: kata
      nodeSelector:
        node.kubernetes.io/instance-type: m5.metal
      volumes:
        - name: claude-sessions
          emptyDir: {}
      containers:
        - name: claude-code
          # Built via: oc start-build claude-code-agent --from-dir=agents/claude-code -n agent-sandboxes
          image: image-registry.openshift-image-registry.svc:5000/agent-sandboxes/claude-code-agent:latest
          ports:
            - containerPort: 7681
              name: web-terminal
              protocol: TCP
          envFrom:
            - configMapRef:
                name: claude-code-config
            - secretRef:
                name: claude-slack-tokens
                optional: true
          env:
            - name: ANTHROPIC_API_KEY
              value: "not-needed"
            - name: TTYD_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: claude-web-terminal
                  key: TTYD_CREDENTIAL
                  optional: true
            # Kubernetes Downward API — DISABLED for PoC (single agent).
            # Re-enable with set-trace-tags.py for per-trace pod/node
            # identification in multi-agent scenarios. See ADR-020.
            # - name: POD_NAME
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.name
            # - name: POD_NAMESPACE
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.namespace
            # - name: NODE_NAME
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: spec.nodeName
          volumeMounts:
            - name: claude-sessions
              mountPath: /opt/app-root/src/.claude
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            exec:
              command: ["claude", "--version"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["claude", "--version"]
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/claude-logs/claude.jsonl"]
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 1
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
        - name: claude-devtools
          image: image-registry.openshift-image-registry.svc:5000/agent-sandboxes/claude-devtools:latest
          ports:
            - containerPort: 3456
              name: devtools-ui
              protocol: TCP
          env:
            - name: CLAUDE_ROOT
              value: /data/.claude
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3456"
          volumeMounts:
            - name: claude-sessions
              mountPath: /data/.claude
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3456
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3456
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
        # claude-task-viewer sidecar — DISABLED.
        # Kanban board for Tasks v2 files (~/.claude/tasks/). Re-enable when
        # multi-agent task coordination is needed. See ADR-027 for context.
        # Image: image-registry.openshift-image-registry.svc:5000/agent-sandboxes/claude-task-viewer:latest
        # Port: 3457, volume: claude-sessions → /data/.claude (readOnly)
      restartPolicy: Always
