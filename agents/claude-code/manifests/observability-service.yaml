apiVersion: v1
kind: Service
metadata:
  name: agents-observe
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: agentops-platform
spec:
  selector:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: agent-standalone
  ports:
    - name: http
      port: 4981
      targetPort: observability
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: agents-observe
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: agentops-platform
spec:
  to:
    kind: Service
    name: agents-observe
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
