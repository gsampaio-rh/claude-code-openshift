apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-observe
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: agents-observe
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: agentops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-observe
      app.kubernetes.io/component: observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-observe
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: agentops-platform
    spec:
      containers:
        - name: agents-observe
          image: image-registry.openshift-image-registry.svc:5000/agent-sandboxes/agents-observe:latest
          ports:
            - containerPort: 4981
              name: http
              protocol: TCP
          env:
            - name: AGENTS_OBSERVE_SERVER_PORT
              value: "4981"
            - name: AGENTS_OBSERVE_DB_PATH
              value: /tmp/observe.db
            - name: AGENTS_OBSERVE_CLIENT_DIST_PATH
              value: /app/client/dist
            - name: AGENTS_OBSERVE_LOG_LEVEL
              value: info
            - name: AGENTS_OBSERVE_RUNTIME
              value: docker
            - name: AGENTS_OBSERVE_SHUTDOWN_DELAY_MS
              value: "0"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4981
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4981
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: agents-observe
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: agents-observe
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: agentops-platform
spec:
  selector:
    app.kubernetes.io/name: agents-observe
    app.kubernetes.io/component: observability
  ports:
    - name: http
      port: 4981
      targetPort: http
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: agents-observe
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: agents-observe
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: agentops-platform
  annotations:
    haproxy.router.openshift.io/timeout: 300s
spec:
  to:
    kind: Service
    name: agents-observe
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
