apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: agents-observe
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: agentops-platform
spec:
  output:
    to:
      kind: ImageStreamTag
      name: agents-observe:latest
  source:
    type: Git
    git:
      uri: https://github.com/simple10/agents-observe.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: agents-observe
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: agentops-platform
