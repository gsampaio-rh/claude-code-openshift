apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: claude-task-viewer
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: task-viewer
    app.kubernetes.io/part-of: agentops-platform
spec:
  output:
    to:
      kind: ImageStreamTag
      name: claude-task-viewer:latest
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: claude-task-viewer
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: task-viewer
    app.kubernetes.io/part-of: agentops-platform
