# Applied dynamically by deploy script (token injected at deploy time).
# The ServiceAccount 'grafana' (rbac.yaml) has 'cluster-monitoring-view' ClusterRole,
# and its token is used as Bearer auth to Thanos Querier.
#
# To regenerate:
#   TOKEN=$(oc create token grafana -n observability --duration=87600h)
#   Then apply this ConfigMap with the token interpolated into secureJsonData.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: telemetry
    app.kubernetes.io/part-of: agentops-platform
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: OpenShift Prometheus
        type: prometheus
        access: proxy
        url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
          tlsSkipVerify: true
          httpHeaderName1: Authorization
        secureJsonData:
          httpHeaderValue1: "Bearer REPLACE_WITH_TOKEN"
