apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: telemetry
    app.kubernetes.io/part-of: agentops-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: otel-collector-spanmetrics
        static_configs:
          - targets: ["otel-collector.observability.svc.cluster.local:8889"]

      - job_name: otel-collector-internals
        static_configs:
          - targets: ["otel-collector.observability.svc.cluster.local:8888"]
