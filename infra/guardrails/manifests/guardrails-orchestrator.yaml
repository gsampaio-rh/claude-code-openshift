  name: guardrails-orchestrator
  namespace: inference
  labels:
    app.kubernetes.io/part-of: agentops
spec:
  orchestratorConfig: "orchestrator-config"
  replicas: 1
  enableBuiltInDetectors: true
  enableGuardrailsGateway: true
  guardrailsGatewayConfig: "gateway-config"
