apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: ocp-dgpmb-gpu-l40s-us-east-2a
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: ocp-dgpmb
  annotations:
    capacity.cluster-autoscaler.kubernetes.io/labels: "kubernetes.io/arch=amd64"
    machine.openshift.io/GPU: "1"
    machine.openshift.io/memoryMb: "131072"
    machine.openshift.io/vCPU: "16"
spec:
  replicas: 1
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: ocp-dgpmb
      machine.openshift.io/cluster-api-machineset: ocp-dgpmb-gpu-l40s-us-east-2a
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: ocp-dgpmb
        machine.openshift.io/cluster-api-machine-role: worker
        machine.openshift.io/cluster-api-machine-type: worker
        machine.openshift.io/cluster-api-machineset: ocp-dgpmb-gpu-l40s-us-east-2a
    spec:
      lifecycleHooks: {}
      metadata:
        labels:
          node-role.kubernetes.io/gpu: ""
      providerSpec:
        value:
          ami:
            id: ami-021a620474c1cd2fe
          apiVersion: machine.openshift.io/v1beta1
          blockDevices:
            - ebs:
                encrypted: true
                iops: 0
                kmsKey:
                  arn: ""
                volumeSize: 1500
                volumeType: gp3
          credentialsSecret:
            name: aws-cloud-credentials
          deviceIndex: 0
          iamInstanceProfile:
            id: ocp-dgpmb-worker-profile
          instanceType: g6e.4xlarge
          kind: AWSMachineProviderConfig
          metadataServiceOptions: {}
          placement:
            availabilityZone: us-east-2a
            region: us-east-2
          securityGroups:
            - filters:
                - name: tag:Name
                  values:
                    - ocp-dgpmb-node
            - filters:
                - name: tag:Name
                  values:
                    - ocp-dgpmb-lb
          subnet:
            filters:
              - name: tag:Name
                values:
                  - ocp-dgpmb-subnet-private-us-east-2a
          tags:
            - name: kubernetes.io/cluster/ocp-dgpmb
              value: owned
            - name: Stack
              value: project openshift-cluster-gdn7x
            - name: config
              value: openshift-cluster
            - name: guid
              value: gdn7x
            - name: owner
              value: unknown
            - name: uuid
              value: 6349c6ee-97bc-5b61-823a-20edac90b7c7
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
