# Template: Bare metal node for Kata Containers (m5.metal)
#
# Cluster-specific values use ${VARIABLE} placeholders.
# Apply via: bash infra/cluster/scripts/create-machineset.sh kata-baremetal
#
# Requires bare metal for /dev/kvm (EC2 VMs don't expose it — ADR-017).
# m5.metal: 96 vCPU, 384 GB RAM. Provisioning takes ~10-15 min.
# Previous cluster had capacity issues in us-east-2a/b; us-east-2c worked.
apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: ${CLUSTER_ID}-kata-baremetal-us-east-2c
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: ${CLUSTER_ID}
spec:
  replicas: 1
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: ${CLUSTER_ID}
      machine.openshift.io/cluster-api-machineset: ${CLUSTER_ID}-kata-baremetal-us-east-2c
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: ${CLUSTER_ID}
        machine.openshift.io/cluster-api-machine-role: worker
        machine.openshift.io/cluster-api-machine-type: worker
        machine.openshift.io/cluster-api-machineset: ${CLUSTER_ID}-kata-baremetal-us-east-2c
    spec:
      lifecycleHooks: {}
      metadata:
        labels:
          node-role.kubernetes.io/worker: ""
          node-role.kubernetes.io/kata-baremetal: ""
      providerSpec:
        value:
          ami:
            id: ${AMI_ID}
          apiVersion: machine.openshift.io/v1beta1
          blockDevices:
            - ebs:
                encrypted: true
                iops: 0
                kmsKey:
                  arn: ""
                volumeSize: 200
                volumeType: gp3
          credentialsSecret:
            name: aws-cloud-credentials
          deviceIndex: 0
          iamInstanceProfile:
            id: ${CLUSTER_ID}-worker-profile
          instanceType: m5.metal
          kind: AWSMachineProviderConfig
          metadataServiceOptions: {}
          placement:
            availabilityZone: us-east-2c
            region: us-east-2
          securityGroups:
            - filters:
                - name: tag:Name
                  values:
                    - ${CLUSTER_ID}-node
            - filters:
                - name: tag:Name
                  values:
                    - ${CLUSTER_ID}-lb
          subnet:
            filters:
              - name: tag:Name
                values:
                  - ${CLUSTER_ID}-subnet-private-us-east-2c
          tags:
            - name: kubernetes.io/cluster/${CLUSTER_ID}
              value: owned
            - name: Stack
              value: project openshift-cluster-${CLUSTER_GUID}
            - name: config
              value: openshift-cluster
            - name: guid
              value: ${CLUSTER_GUID}
            - name: owner
              value: unknown
            - name: uuid
              value: ${CLUSTER_UUID}
          userDataSecret:
            name: worker-user-data
