apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-standalone
  namespace: agent-sandboxes
  labels:
    app.kubernetes.io/name: claude-code
    app.kubernetes.io/component: agent-standalone
    app.kubernetes.io/part-of: agentops-platform
    app.openshift.io/runtime: claude-code
  annotations:
    app.openshift.io/runtime-image: "https://claude.ai/images/claude_app_icon.png"
    openshift.io/display-name: "Claude Code Agent"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-code
      app.kubernetes.io/component: agent-standalone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-code
        app.kubernetes.io/component: agent-standalone
        app.kubernetes.io/part-of: agentops-platform
        kagenti.io/type: agent
    spec:
      serviceAccountName: claude-code-agent
      runtimeClassName: kata
      nodeSelector:
        node.kubernetes.io/instance-type: m5.metal
      containers:
        - name: claude-code
          # Built via: oc start-build claude-code-agent --from-dir=infra/claude-code -n agent-sandboxes
          image: image-registry.openshift-image-registry.svc:5000/agent-sandboxes/claude-code-agent:latest
          envFrom:
            - configMapRef:
                name: claude-code-config
          env:
            - name: ANTHROPIC_API_KEY
              value: "not-needed"
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            exec:
              command: ["claude", "--version"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["claude", "--version"]
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/claude-logs/claude.jsonl"]
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 1
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
      restartPolicy: Always
