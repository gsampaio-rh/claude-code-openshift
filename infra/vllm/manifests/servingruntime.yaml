apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen25-14b
  namespace: inference
  annotations:
    openshift.io/display-name: vLLM for Qwen2.5-14B-Instruct
  labels:
    opendatahub.io/dashboard: "true"
    app.kubernetes.io/part-of: agentops
spec:
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.4
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name=qwen25-14b
        - --max-model-len=16384
        - --tool-call-parser=hermes
        - --enable-auto-tool-choice
        - --enable-chunked-prefill
        - --gpu-memory-utilization=0.95
        - --enforce-eager
      ports:
        - containerPort: 8080
          protocol: TCP
