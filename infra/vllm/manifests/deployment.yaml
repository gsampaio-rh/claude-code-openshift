apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen25-14b
  namespace: inference
  labels:
    app.kubernetes.io/name: qwen25-14b
    app.kubernetes.io/component: model-serving
    app.kubernetes.io/part-of: agentops
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen25-14b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen25-14b
        app.kubernetes.io/component: model-serving
        app.kubernetes.io/part-of: agentops
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-L40S
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.19.0
          args:
            - --port=8080
            - --model=RedHatAI/Qwen2.5-14B-Instruct-FP8-dynamic
            - --served-model-name=qwen25-14b
            - --max-model-len=32768
            - --tool-call-parser=hermes
            - --enable-auto-tool-choice
            - --enable-chunked-prefill
            - --gpu-memory-utilization=0.90
            - --download-dir=/mnt/models
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: HF_HOME
              value: /mnt/models
            - name: TRANSFORMERS_CACHE
              value: /mnt/models
            - name: XDG_CACHE_HOME
              value: /mnt/models/.cache
            - name: NUMBA_CACHE_DIR
              value: /tmp/numba_cache
            - name: TRITON_CACHE_DIR
              value: /tmp/triton_cache
            - name: HOME
              value: /mnt/models
          resources:
            requests:
              cpu: "1"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 48Gi
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: model-cache
              mountPath: /mnt/models
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: qwen25-14b-model-cache
        - name: tmp
          emptyDir: {}
